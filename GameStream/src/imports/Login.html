<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 10% 10%, #243b71 0%, transparent 35%),
                        radial-gradient(circle at 90% 20%, #9d4edd 0%, transparent 30%),
                        linear-gradient(120deg, #0b132b, #1c2541);
            color: #f5f7ff;
        }

        .ring {
            position: relative;
            width: 360px;
            height: 360px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring i {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(255, 255, 255, 0.18);
            transition: 0.4s;
        }

        .ring i:nth-child(1) {
            border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            animation: animate 6s linear infinite;
        }

        .ring i:nth-child(2) {
            border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
            animation: animate 4s linear infinite;
        }

        .ring i:nth-child(3) {
            border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
            animation: animate2 10s linear infinite;
        }

        .ring:hover i:nth-child(1) {
            border: 6px solid #ffb703;
            filter: drop-shadow(0 0 20px #ffb703);
        }

        .ring:hover i:nth-child(2) {
            border: 6px solid #bfc7e6;
            filter: drop-shadow(0 0 20px #bfc7e6);
        }

        .ring:hover i:nth-child(3) {
            border: 6px solid #f5f7ff;
            filter: drop-shadow(0 0 20px #f5f7ff);
        }

        .login {
            position: absolute;
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1;
        }

        .login h2 {
            text-align: center;
            margin-bottom: 4px;
        }

        .inputBox input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            color: #f5f7ff;
            outline: none;
        }

        .inputBox input[type="submit"] {
            background: #ffb703;
            color: #161616;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .inputBox input[type="submit"]:hover {
            background: #ffc947;
        }

        .links {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .links a {
            color: #bfc7e6;
            text-decoration: none;
            font-size: 14px;
        }

        .links a:hover {
            color: #f5f7ff;
        }

        .status {
            text-align: center;
            font-size: 0.85rem;
            min-height: 18px;
            color: #bfc7e6;
        }

        @keyframes animate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes animate2 {
            0% {
                transform: rotate(360deg);
            }
            100% {
                transform: rotate(0deg);
            }
        }
    </style>
</head>
<body>
    <div class="ring">
        <i></i>
        <i></i>
        <i></i>

        <form class="login" id="loginForm" action="Home.html" method="get">
            <h2>Login</h2>

            <div class="inputBox">
                <input type="text" id="username" placeholder="Username" required>
            </div>

            <div class="inputBox">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="inputBox">
                <input type="submit" value="Login">
            </div>

            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="#">Sign Up</a>
            </div>
        </form>
    </div>


<script src="assets/game-covers.js"></script>
</body>
</html>
